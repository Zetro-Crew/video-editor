# =============================================================================
# TEMPLATE — adjust <namespace>, image name, Secret/ConfigMap values before applying
#
# Apply order:
#   1. oc apply -f deploy-server.yml   (creates ConfigMap + Secret stubs first time)
#   2. Fill in the Secret values (see below)
#   3. oc apply -f deploy-server.yml   (or oc rollout restart deployment/video-editor-server)
# =============================================================================

# ---------------------------------------------------------------------------
# ConfigMap — non-sensitive config
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: video-editor-server-config
  namespace: <namespace>
data:
  PORT: "4001"
  # IMPORTANT: must be 0.0.0.0 in a pod — default 127.0.0.1 binds only loopback
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  SERVICE_NAME: "video-editor-server"
  SERVICE_VERSION: "1.0.0"

  # FFmpeg
  FFMPEG_PRESET: "veryfast"
  FFMPEG_CRF: "20"
  FFMPEG_AUDIO_BITRATE: "192k"
  FFMPEG_MAX_CONCURRENT: "2"
  MIN_TRANSCODE_SEGMENT_SECONDS: "0.35"

  # S3 / object storage (non-secret parts)
  S3_BUCKET: "react-video-editor"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"
  S3_UPLOAD_PREFIX: "uploads"
  S3_OUTPUT_PREFIX: "output"
  S3_PREVIEW_PREFIX: "preview"
  S3_AUTO_CREATE_BUCKET: "false"

  # Redis (non-secret parts)
  REDIS_PORT: "6379"
  JOB_PROGRESS_TTL_SECONDS: "600"

  # Preview
  MAX_PREVIEW_DURATION_MS: "3600000"
  PREVIEW_JOB_TTL_SECONDS: "86400"
  ENABLE_MPD_RESTRICTIONS: "false"

  # Render
  RENDER_URL_EXPIRY_SECONDS: "86400"

  # Transcode
  TRANSCODE_TIMEOUT_MS: "7200000"
  MAX_TEMP_FILE_SIZE_MB: "5000"
  MPD_TRANSCODE_CRF_MULTI: "10"
  MPD_TRANSCODE_CRF_SINGLE: "18"
  MPD_TRANSCODE_PRESET: "medium"

  # Telemetry (set to your collector endpoint or leave empty to disable)
  OTEL_ENDPOINT: ""

  # External preview API (empty = demo mode)
  CHANNEL_PLAY_API_BASE_URL: ""

---
# ---------------------------------------------------------------------------
# Secret — sensitive values  (fill in before applying)
# To create manually:
#   oc create secret generic video-editor-server-secrets \
#     --from-literal=S3_ACCESS_KEY_ID=<value> \
#     --from-literal=S3_SECRET_ACCESS_KEY=<value> \
#     --from-literal=REDIS_PASSWORD=<value> \
#     --from-literal=SERVER_BASE_URL=https://<your-server-route> \
#     --from-literal=S3_ENDPOINT=https://<your-minio-or-s3> \
#     -n <namespace>
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: video-editor-server-secrets
  namespace: <namespace>
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: "<REPLACE_ME>"
  S3_SECRET_ACCESS_KEY: "<REPLACE_ME>"
  REDIS_HOST: "<REPLACE_ME>"          # e.g. redis-service or Redis cluster host
  REDIS_PASSWORD: "<REPLACE_ME>"      # leave empty string if no auth
  # Public base URL the server uses when generating signed S3 URLs
  SERVER_BASE_URL: "https://<REPLACE_ME>"
  # MinIO / S3-compatible endpoint (use https in prod)
  S3_ENDPOINT: "https://<REPLACE_ME>"

---
# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-editor-server
  namespace: <namespace>
  labels:
    app: video-editor-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-editor-server
  template:
    metadata:
      labels:
        app: video-editor-server
    spec:
      containers:
        - name: server
          # Replace with your actual image registry / tag
          image: image-registry.openshift-image-registry.svc:5000/<namespace>/server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
              protocol: TCP
          # Load all non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: video-editor-server-config
          # Load secrets individually so they overlay correctly
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: video-editor-server-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: video-editor-server-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: video-editor-server-secrets
                  key: S3_ENDPOINT
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: video-editor-server-secrets
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: video-editor-server-secrets
                  key: REDIS_PASSWORD
            - name: SERVER_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: video-editor-server-secrets
                  key: SERVER_BASE_URL
          # No /health endpoint — probe TCP socket directly
          readinessProbe:
            tcpSocket:
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 4001
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"   # FFmpeg jobs are memory-hungry; tune to your workload
      securityContext:
        runAsNonRoot: true

---
# ---------------------------------------------------------------------------
# Service  (ClusterIP — not exposed externally; traffic via Nginx gateway)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: video-editor-server
  namespace: <namespace>
  labels:
    app: video-editor-server
spec:
  selector:
    app: video-editor-server
  ports:
    - name: http
      port: 4001
      targetPort: 4001
      protocol: TCP
  type: ClusterIP
