apiVersion: v1
kind: ConfigMap
metadata:
  name: video-editor-server-config
  namespace: # TODO: your-ocp-namespace
data:
  PORT: "8080"
  # Must bind 0.0.0.0 inside a pod — default 127.0.0.1 binds loopback only
  HOST: "0.0.0.0"

  # Core service (in-cluster). Adapter appends /channels/:id/play to this.
  CORE_BASE_URL: "http://core:8080/private"

  # Public frontend Route URL — server uses it to build signed /editor/segment
  # URLs that the browser fetches and nginx proxies back to the server.
  SERVER_BASE_URL: "# TODO: https://video-editor.apps.yourcluster.com"

  # FFmpeg (used by preview source prep; render runs in the worker)
  FFMPEG_PRESET: "veryfast"
  FFMPEG_CRF: "20"
  FFMPEG_AUDIO_BITRATE: "192k"
  FFMPEG_MAX_CONCURRENT: "2"
  MIN_TRANSCODE_SEGMENT_SECONDS: "0.35"

  # Preview
  MAX_PREVIEW_DURATION_MS: "3600000"
  PREVIEW_JOB_TTL_SECONDS: "86400"
  S3_PREVIEW_PREFIX: "preview"
  ENABLE_MPD_RESTRICTIONS: "true"

  # Transcode
  TRANSCODE_TIMEOUT_MS: "7200000"
  MAX_TEMP_FILE_SIZE_MB: "5000"
  MPD_TRANSCODE_CRF_MULTI: "10"
  MPD_TRANSCODE_CRF_SINGLE: "18"
  MPD_TRANSCODE_PRESET: "medium"

  # S3 / object storage (non-secret parts)
  #
  # MinIO/S3 CORS PREREQUISITE: the browser PUTs uploads directly to S3_ENDPOINT,
  # so the object store must allow CORS from the frontend origin. For MinIO set
  # MINIO_API_CORS_ALLOW_ORIGIN on the MinIO deployment to the comma-separated
  # list of allowed frontend origins (matching SERVER_BASE_URL host(s) the
  # uploader runs from). Without this every browser upload will fail with a CORS
  # preflight error. See docker-compose.yml for the dev setup.
  S3_BUCKET: "# TODO: your-bucket-name"
  S3_REGION: "us-east-1"
  S3_ENDPOINT: "# TODO: https://your-minio.internal"
  S3_FORCE_PATH_STYLE: "true"
  S3_UPLOAD_PREFIX: "uploads"
  S3_OUTPUT_PREFIX: "output"
  S3_AUTO_CREATE_BUCKET: "false"

  # Upload cap (server-enforced + signed Content-Length). Matches the previous
  # 500 MB multipart limit so existing clients don't break.
  UPLOAD_MAX_SIZE_BYTES: "524288000"

  # Render
  RENDER_URL_EXPIRY_SECONDS: "86400"

  # Command publish (POST /render → render.requested queue).
  # If broker confirm does not arrive within this window the publish is retried,
  # and after 3 attempts the controller returns 503.
  COMMAND_PUBLISH_CONFIRM_TIMEOUT_MS: "10000"

  # OTEL
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://open-telemetry-collector:4317"
  SERVICE_NAME: "video-editor-server"
  SERVICE_VERSION: "1.0.0"
  LOG_LEVEL: "info" 
