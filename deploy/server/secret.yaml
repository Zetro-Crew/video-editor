apiVersion: v1
kind: Secret
metadata:
  name: video-editor-server-secrets
  namespace: # TODO: your-ocp-namespace
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: "# TODO"
  S3_SECRET_ACCESS_KEY: "# TODO"
  # Leave empty string if Redis has no auth
  REDIS_PASSWORD: "# TODO"
  # AMQP URL contains credentials — keep in Secret, not ConfigMap
  RABBITMQ_URL: "# TODO: amqp://user:pass@rabbitmq.internal:5672"
  # HMAC secret for /editor/segment URL signing — generate with: openssl rand -hex 32
  PREVIEW_SIGNING_SECRET: "# TODO: >=32 chars"
