apiVersion: v1
kind: Secret
metadata:
  name: video-editor-server-secrets
  namespace: # TODO: your-ocp-namespace
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: "# TODO"
  S3_SECRET_ACCESS_KEY: "# TODO"
  # AMQP URL. `amqps://` triggers mTLS — process reads /bundle.pem (CA) and
  # /tmp/certificates/rabbitmq/rabbit_{cert,key}.pem at boot (no userinfo needed).
  QUEUE_URL: "# TODO: amqps://rabbit.internal:5671"
  # HMAC secret for /editor/segment URL signing — generate with: openssl rand -hex 32
  PREVIEW_SIGNING_SECRET: "# TODO: >=32 chars"
