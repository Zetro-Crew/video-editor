apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-editor-server
  namespace: # TODO: your-ocp-namespace
  labels:
    app: video-editor-server
spec:
  replicas: 2
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 50%
  selector:
    matchLabels:
      app: video-editor-server
  template:
    metadata:
      labels:
        app: video-editor-server
    spec:
      # Long-running renders (TRANSCODE_TIMEOUT_MS=2h) cannot finish within k8s
      # grace; this just gives in-flight HTTP requests + LB endpoint removal
      # time to drain before SIGTERM-induced fastify close.
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: internal-registry-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: video-editor-server
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: video-editor-server
      volumes:
        - name: rabbit-values
          secret:
            secretName: rabbit-values
            items:
              - key: rabbit_cert.pem
                path: rabbit_cert.pem
              - key: rabbit_key.pem
                path: rabbit_key.pem
            defaultMode: 0400
        - name: ssl-values
          secret:
            secretName: ssl-values
            items:
              - key: bundle.pem
                path: bundle.pem
            defaultMode: 0400
      containers:
        - name: server
          image: # TODO: your-registry.internal/video-editor-server:latest
          ports:
            - containerPort: 8080
          lifecycle:
            preStop:
              exec:
                # Sleep before SIGTERM so Service endpoints depropagate first;
                # prevents new requests routing to a pod about to shut down.
                command: ["/bin/sh", "-c", "sleep 15"]
          envFrom:
            - configMapRef:
                name: video-editor-server-config
            - secretRef:
                name: video-editor-server-secrets
          volumeMounts:
            - name: rabbit-values
              mountPath: /tmp/certificates/rabbitmq
              readOnly: true
            - name: ssl-values
              mountPath: /bundle.pem
              subPath: bundle.pem
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
