apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-editor-frontend
  namespace: # TODO: your-ocp-namespace
  labels:
      app: ztube
      service: video-editor-frontend
spec:
  replicas: 2
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 50%
  selector:
    matchLabels:
      app: ztube
      service: video-editor-frontend
  template:
    metadata:
      labels:
        app: ztube
        service: video-editor-frontend
    spec:
      imagePullSecrets:
        - name: internal-registry-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    service: video-editor-frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: # TODO: your-registry.internal/video-editor-frontend:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
