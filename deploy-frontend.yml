# =============================================================================
# TEMPLATE — adjust <namespace>, image name, and env values before applying
# oc apply -f deploy-frontend.yml
# =============================================================================

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-editor-frontend
  namespace: <namespace>
  labels:
    app: video-editor-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-editor-frontend
  template:
    metadata:
      labels:
        app: video-editor-frontend
    spec:
      containers:
        - name: frontend
          # Replace with your actual image registry / tag
          image: image-registry.openshift-image-registry.svc:5000/<namespace>/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080  # Nginx runs on 8080 (non-root, OpenShift-safe)
              protocol: TCP
          env:
            # Comma-separated origins allowed to embed the editor in an iframe.
            # Set to the URL(s) of your Angular / other host app.
            - name: VITE_EDITOR_PARENT_ORIGINS
              value: "https://<your-host-app-domain>"
          # The frontend static build is served by Nginx — no startup cost.
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      # OpenShift uses a random UID; Nginx image must be built to handle this.
      securityContext:
        runAsNonRoot: true

---
# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: video-editor-frontend
  namespace: <namespace>
  labels:
    app: video-editor-frontend
spec:
  selector:
    app: video-editor-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

---
# ---------------------------------------------------------------------------
# Route  (OpenShift-specific — exposes the service externally)
# If you prefer to route through your Nginx gateway only, remove this Route
# and let the gateway handle external traffic.
# ---------------------------------------------------------------------------
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: video-editor-frontend
  namespace: <namespace>
  labels:
    app: video-editor-frontend
spec:
  # Leave host empty to let OpenShift auto-assign, or set explicitly:
  # host: video-editor.<cluster-domain>
  to:
    kind: Service
    name: video-editor-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
