# =============================================================================
# TEMPLATE — Nginx gateway config for react-video-editor
#
# Drop this into your gateway Nginx instance (e.g. as a server block in
# /etc/nginx/conf.d/video-editor.conf or included from nginx.conf).
#
# Assumes:
#   - video-editor-frontend resolves to the frontend Service (port 8080)
#   - video-editor-server   resolves to the server Service   (port 8080)
#   (These are Kubernetes/OpenShift DNS names within the same namespace.
#    Adjust if your gateway lives outside the cluster.)
#
# Listens on 8080 (non-root; adjust to 80/443 if your gateway runs as root
# or terminates TLS before reaching this config).
# =============================================================================

upstream frontend {
    server video-editor-frontend:8080;
}

upstream api_server {
    server video-editor-server:8080;
    # Add more replicas here if you scale the server, e.g.:
    # server video-editor-server-2:8080;
}

server {
    listen 8080;
    server_name _;   # catch-all; replace with your actual hostname if needed

    # -----------------------------------------------------------------------
    # Compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # -----------------------------------------------------------------------
    # API routes  →  Node.js Fastify server
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://api_server;
        proxy_http_version 1.1;

        # WebSocket support (not currently used but harmless to keep)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FFmpeg render / edit jobs can run for hours — keep timeouts high
        proxy_read_timeout    7200s;
        proxy_send_timeout    7200s;
        proxy_connect_timeout   60s;

        # Large file uploads (500 MB limit set in Fastify)
        client_max_body_size 512m;
    }

    # -----------------------------------------------------------------------
    # HLS segment proxy  (streaming; keep timeouts generous)
    # Already under /api/ but calling out explicitly for clarity
    # -----------------------------------------------------------------------
    location /api/editor/segment {
        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_buffering off;   # stream segments without buffering
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # -----------------------------------------------------------------------
    # Frontend SPA  →  Nginx serving static React build
    # Falls back to index.html so React Router handles client-side routing
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # SPA fallback: if the upstream returns 404, serve index.html
        # (Only needed if the frontend Nginx itself doesn't handle try_files.
        #  If it does, you can remove the error_page + location block below.)
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend/index.html;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Security headers  (adjust CSP to match your actual origins)
    # -----------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Content-Security-Policy: tighten this for production
    # add_header Content-Security-Policy "default-src 'self'; ..." always;

    # -----------------------------------------------------------------------
    # Access log
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/video-editor-access.log;
    error_log  /var/log/nginx/video-editor-error.log warn;
}
