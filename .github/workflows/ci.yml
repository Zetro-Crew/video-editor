name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Lint / Type-check / Knip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Provision @ztube/observability stub (open-network CI only)
        run: cp -R tools/observability-stub "$GITHUB_WORKSPACE/../observability-sdk"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Turbo env
        run: |
          test -n "$TURBO_TOKEN" && echo "TURBO_TOKEN exists" || echo "TURBO_TOKEN missing"
          test -n "$TURBO_TEAM" && echo "TURBO_TEAM exists: $TURBO_TEAM" || echo "TURBO_TEAM missing"

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Knip
        run: pnpm knip

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [static-checks]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Provision @ztube/observability stub (open-network CI only)
        run: cp -R tools/observability-stub "$GITHUB_WORKSPACE/../observability-sdk"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Turbo env
        run: |
          test -n "$TURBO_TOKEN" && echo "TURBO_TOKEN exists" || echo "TURBO_TOKEN missing"
          test -n "$TURBO_TEAM" && echo "TURBO_TEAM exists: $TURBO_TEAM" || echo "TURBO_TEAM missing"

      - name: Test
        run: pnpm test
